# .coderabbit.yaml
reviews:
  # طلب مراجعة عالية الجودة
  request_review: true
  # منع المراجعة التلقائية لملفات معينة
  path_filters:
    - "!**/docs/**"
    - "!**/*.md"
  # إعطاء تعليمات مخصصة باللغة الطبيعية
  instructions: >
    ركز على الثغرات الأمنية وأماكن تسرب الذاكرة.
    اتبع دليل أسلوب Google للغة C++.
    تجاهل اقتراحات التنسيق، فهي تدار بواسطة Prettier.
